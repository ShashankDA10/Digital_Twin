<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="module"
  src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js">
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: #0C1323;
  overflow: hidden;
}
model-viewer {
  width: 100%;
  height: 100%;
  background-color: #0C1323;
  --poster-color: #0C1323;
  --progress-bar-color: transparent;
  --progress-mask: transparent;
}
#fallback {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  color: #8A94A8;
  font-family: sans-serif;
  font-size: 14px;
  flex-direction: column;
  gap: 8px;
  background: #0C1323;
}
#fallback svg {
  opacity: 0.4;
}
</style>
</head>
<body>
<model-viewer
  id="mv"
  src="images/avatar.glb"
  camera-orbit="0deg 78deg auto"
  camera-target="0m 0.9m 0m"
  field-of-view="28deg"
  auto-rotate
  auto-rotate-delay="0"
  rotation-per-second="6deg"
  disable-zoom
  disable-pan
  shadow-intensity="0"
  exposure="0.9"
  interpolation-decay="200">
</model-viewer>
<div id="fallback">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="8" r="4" stroke="#8A94A8" stroke-width="1.5"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#8A94A8" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <span>Avatar loading…</span>
</div>
<script>
  const mv = document.getElementById('mv');
  const fb = document.getElementById('fallback');
  let timer = setTimeout(() => {
    fb.style.display = 'flex';
  }, 8000);
  mv.addEventListener('load', () => {
    clearTimeout(timer);
    fb.style.display = 'none';
  });
</script>
</body>
</html>
