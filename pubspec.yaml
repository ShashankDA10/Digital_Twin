name: bodyclone
description: A mobile app with Flutter frontend and Python backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  http: ^1.1.0
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  path: ^1.8.3
  health: 13.1.3
  speech_to_text: ^7.0.0
  permission_handler: ^11.1.0
  flutter_animate: ^4.5.2
  webview_flutter: ^4.10.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/avatar.html
